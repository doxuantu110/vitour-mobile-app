spring:
  profiles:
    active: dev
  application:
    name: vitour-backend

server:
  address: 0.0.0.0
  port: 8080

firebase:
  config: classpath:serviceAccountKey.json

# SePay Configuration
sepay:
  bank: MBBank
  account-number: YOUR_REAL_BANK_ACCOUNT
  account-name: YOUR_ACCOUNT_NAME

# MoMo Sandbox Dummy Configuration (Required by MomoService bean to load context)
momo:
  endpoint: https://test-payment.momo.vn/v2/gateway/api/create
  partnerCode: MOMO_TEST
  accessKey: YOUR_ACCESS_KEY
  secretKey: YOUR_SECRET_KEY
  redirectUrl: vitour://payment
  ipnUrl: https://your-ngrok-url.ngrok.io/api/payment/momo/ipn
  requestType: captureWallet
